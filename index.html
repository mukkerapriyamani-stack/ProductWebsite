<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Category Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="main-view">
        <h1>Store Directory</h1>
        
        <div class="search-container">
            <div class="search-wrapper">
                <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="#888" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" id="searchInput" placeholder="Search for products, brands, or categories...">
            </div>
        </div>

        <div id="products"></div>
    </div>

    <div id="details-view" class="hidden">
        <button id="backBtn" class="back-btn">&larr; Back to Products</button>
        <div id="product-detail-content"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
